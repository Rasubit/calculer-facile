<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Calculateur Carburant — Coût & Consommation — Calculer-Facile</title>
  <meta name="description" content="Calculez le coût de votre trajet et la consommation aux 100 km instantanément.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray:  #8a8a8a;
      --light: #f2f2f2;
      --acc:   #3a2a0a;
      --acc-bg:#f7f2e8;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }

    .logo {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none; color: var(--black);
    }

    .logo-dot {
      width: 18px; height: 18px; background: var(--black);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }

    .logo-dot svg { width: 11px; height: 11px; }
    .logo-name { font-size: 13.5px; font-weight: 500; letter-spacing: -0.01em; }

    nav { display: flex; align-items: center; gap: 0; }

    nav a {
      font-size: 13px; color: var(--black); text-decoration: none;
      padding: 6px 13px; border-radius: 7px; transition: background 0.12s;
    }

    nav a:hover { background: var(--light); }
    nav a.nav-active {
      background: var(--black);
      color: var(--white);
      border-radius: 100px;
      padding: 8px 18px;
      font-weight: 500;
    }

    nav a.nav-active:hover { background: #282828; }
    

    .btn-pill {
      background: var(--black); color: var(--white) !important;
      border-radius: 100px !important; padding: 8px 18px !important;
      font-weight: 500 !important; margin-left: 6px;
    }

    .btn-pill:hover { background: #282828 !important; }

    main {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 100px 20px 80px;
    }

    .hero-eyebrow {
      font-size: 13px; color: var(--gray); letter-spacing: 0.01em;
      margin-bottom: 12px; text-align: center;
    }

    .hero-title {
      font-size: clamp(48px, 8vw, 100px);
      font-weight: 300; letter-spacing: -0.035em; line-height: 1.0;
      text-align: center; color: var(--black); margin-bottom: 52px;
      user-select: none;
    }

    .float-wrap {
      position: relative; width: 420px;
      max-width: calc(100vw - 40px);
    }

    .float-card {
      background: var(--white); border-radius: 26px;
      border: 1px solid rgba(0,0,0,0.08); overflow: hidden;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.03), 0 4px 8px rgba(0,0,0,0.05),
        0 12px 24px rgba(0,0,0,0.07), 0 32px 56px rgba(0,0,0,0.09),
        0 64px 96px rgba(0,0,0,0.07);
      animation: levitate 7s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @keyframes levitate {
      0%   { transform: translateY(0px) rotateX(0deg); }
      50%  { transform: translateY(-12px) rotateX(1deg); }
      100% { transform: translateY(0px) rotateX(0deg); }
    }

    .card-chrome {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 18px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .chrome-dot { width: 10px; height: 10px; border-radius: 50%; }
    .d-red   { background: #ff5f57; }
    .d-amber { background: #ffbd2e; }
    .d-green { background: #28c840; }

    .chrome-label {
      font-size: 11px; color: #ccc; margin-left: auto;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .card-body { padding: 20px; }

    /* Mode toggle */
    .mode-row { display: flex; gap: 8px; margin-bottom: 16px; }

    .mode-btn {
      flex: 1; background: #f7f7f7; border: 1.5px solid #ececec;
      border-radius: 10px; padding: 9px 6px; font-size: 11.5px;
      font-weight: 500; font-family: 'Inter', sans-serif;
      color: var(--gray); cursor: pointer; transition: all 0.14s;
      text-align: center;
    }

    .mode-btn.active {
      background: var(--black); border-color: var(--black); color: var(--white);
    }

    /* Fields */
    .fields-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; align-items: center; }

    .field-lbl {
      font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: #c0c0c0; text-align: center;
    }

    .input-wrap { position: relative; width: 100%; }

    .field input {
      width: 100%; background: #f7f7f7; border: 1.5px solid #ececec;
      border-radius: 13px; padding: 12px 50px 12px 14px;
      font-size: 22px; font-weight: 300; font-family: 'Inter', sans-serif;
      color: var(--black); outline: none; text-align: center;
      transition: border-color 0.14s, background 0.14s;
      -moz-appearance: textfield;
    }

    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field input::placeholder { color: #d0d0d0; }
    .field input:focus { border-color: var(--black); background: #fff; }

    .unit-mark {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); font-size: 11px;
      font-weight: 500; color: #bbb; pointer-events: none;
      white-space: nowrap;
    }

    /* Result */
    .result-area {
      background: #f7f7f7; border-radius: 16px; padding: 16px 18px;
      margin-bottom: 14px; min-height: 70px; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.25s; text-align: center;
    }

    .result-area.has-result { background: var(--acc-bg); }

    .res-idle { font-size: 12px; color: #ccc; line-height: 1.6; text-align: center; }

    .res-content {
      width: 100%; display: flex; flex-direction: column;
      align-items: center; gap: 6px;
    }

    .res-main {
      font-size: 46px; font-weight: 300; letter-spacing: -0.04em;
      color: var(--acc); line-height: 1;
    }

    .res-sub-row {
      display: flex; gap: 10px; align-items: center;
      justify-content: center; flex-wrap: wrap;
    }

    .res-pill {
      font-size: 10px; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 100px;
      background: rgba(58,42,10,0.1); color: var(--acc);
    }

    .res-secondary { font-size: 11px; color: #bbb; }

    .res-formula {
      font-size: 11px; font-style: italic; color: #c8c8c8;
      text-align: center; margin-top: 2px;
    }

    .calc-btn {
      width: 100%; background: var(--black); color: var(--white);
      border: none; border-radius: 13px; padding: 15px;
      font-size: 13.5px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.12s, transform 0.1s;
    }

    .calc-btn:hover  { background: #1e1e1e; }
    .calc-btn:active { transform: scale(0.99); }

    .ground-shadow {
      width: 60%; height: 20px; margin: 0 auto;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, transparent 70%);
      border-radius: 50%; animation: gshadow 7s ease-in-out infinite;
    }

    @keyframes gshadow {
      0%   { transform: scaleX(1);    opacity: 0.7; }
      50%  { transform: scaleX(0.82); opacity: 0.4; }
      100% { transform: scaleX(1);    opacity: 0.7; }
    }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; pointer-events: none;
    }

    footer span { font-size: 11.5px; color: #d0d0d0; }

    @media (max-width: 600px) {
      nav { display: none; }
      .hero-title { font-size: 42px; margin-bottom: 36px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-dot">
      <svg viewBox="0 0 11 11" fill="none">
        <rect x="1"   y="1"   width="3.5" height="2.2" rx="0.6" fill="white"/>
        <rect x="6.5" y="1"   width="3.5" height="2.2" rx="0.6" fill="white"/>
        <rect x="1"   y="4.4" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="6.5" y="4.4" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="1"   y="7.2" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="6.5" y="7.2" width="3.5" height="1.6" rx="0.6" fill="white"/>
      </svg>
    </div>
    <span class="logo-name">Calculer-Facile</span>
  </a>

  <nav>
    <a href="/fr/" >Évolution</a>
    <a href="/fr/tva/" >TVA</a>
    <a href="/fr/remise/" >Remise</a>
    <a href="/fr/imc/" >IMC</a>
    <a href="/fr/credit/" >Crédit</a>
    <a href="/fr/carburant/" class="nav-active">Carburant</a>
  </nav>
</header>

<main>
  <p class="hero-eyebrow">Outil gratuit &mdash; résultat immédiat</p>
  <h1 class="hero-title">Coût carburant</h1>

  <div class="float-wrap">
    <div class="float-card">

      <div class="card-chrome">
        <div class="chrome-dot d-red"></div>
        <div class="chrome-dot d-amber"></div>
        <div class="chrome-dot d-green"></div>
        <span class="chrome-label">calculer-facile.fr</span>
      </div>

      <div class="card-body">

        <!-- Mode -->
        <div class="mode-row">
          <button class="mode-btn active" id="mode-trajet">Coût d'un trajet</button>
          <button class="mode-btn" id="mode-conso">Consommation réelle</button>
        </div>

        <!-- Fields trajet -->
        <div id="fields-trajet" class="fields-stack">
          <div class="field">
            <span class="field-lbl">Distance</span>
            <div class="input-wrap">
              <input id="distance" type="number" placeholder="250" inputmode="decimal" autofocus />
              <span class="unit-mark">km</span>
            </div>
          </div>
          <div class="field">
            <span class="field-lbl">Consommation</span>
            <div class="input-wrap">
              <input id="conso" type="number" placeholder="6.5" inputmode="decimal" step="0.1" />
              <span class="unit-mark">L/100km</span>
            </div>
          </div>
          <div class="field">
            <span class="field-lbl">Prix du carburant</span>
            <div class="input-wrap">
              <input id="prix" type="number" placeholder="1.85" inputmode="decimal" step="0.01" />
              <span class="unit-mark">€/L</span>
            </div>
          </div>
        </div>

        <!-- Fields conso réelle -->
        <div id="fields-conso" class="fields-stack" style="display:none;">
          <div class="field">
            <span class="field-lbl">Litres consommés</span>
            <div class="input-wrap">
              <input id="litres" type="number" placeholder="45" inputmode="decimal" />
              <span class="unit-mark">L</span>
            </div>
          </div>
          <div class="field">
            <span class="field-lbl">Kilomètres parcourus</span>
            <div class="input-wrap">
              <input id="km" type="number" placeholder="600" inputmode="decimal" />
              <span class="unit-mark">km</span>
            </div>
          </div>
        </div>

        <div class="result-area" id="res-area">
          <p class="res-idle">Renseignez les champs pour calculer.</p>
        </div>

        <button class="calc-btn" id="calc-btn">Calculer</button>

      </div>
    </div>
    <div class="ground-shadow"></div>
  </div>
</main>

<footer>
  <span>© 2025 calculer-facile.fr</span>
</footer>

<script>
  const area    = document.getElementById('res-area');
  const btn     = document.getElementById('calc-btn');
  const mTrajet = document.getElementById('mode-trajet');
  const mConso  = document.getElementById('mode-conso');
  const fTrajet = document.getElementById('fields-trajet');
  const fConso  = document.getElementById('fields-conso');

  let mode = 'trajet';

  mTrajet.addEventListener('click', () => {
    mode = 'trajet';
    mTrajet.classList.add('active'); mConso.classList.remove('active');
    fTrajet.style.display = 'flex'; fConso.style.display = 'none';
    reset();
  });

  mConso.addEventListener('click', () => {
    mode = 'conso';
    mConso.classList.add('active'); mTrajet.classList.remove('active');
    fConso.style.display = 'flex'; fTrajet.style.display = 'none';
    reset();
  });

  function reset() {
    area.className = 'result-area';
    area.innerHTML = '<p class="res-idle">Renseignez les champs pour calculer.</p>';
  }

  function fmt2(n) { return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmt1(n) { return n.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 2 }); }

  function calc() {
    if (mode === 'trajet') {
      const d = parseFloat(document.getElementById('distance').value);
      const c = parseFloat(document.getElementById('conso').value);
      const p = parseFloat(document.getElementById('prix').value);

      if (isNaN(d) || isNaN(c) || isNaN(p) || d <= 0 || c <= 0 || p <= 0) {
        reset(); return;
      }

      const litresTotal = d * c / 100;
      const cout        = litresTotal * p;

      area.className = 'result-area has-result';
      area.innerHTML = `
        <div class="res-content">
          <span class="res-main">${fmt2(cout)} €</span>
          <div class="res-sub-row">
            <span class="res-pill">${fmt1(d)} km · ${fmt1(c)} L/100</span>
            <span class="res-secondary">${fmt1(litresTotal)} L consommés</span>
          </div>
          <p class="res-formula">${fmt1(d)} km × ${fmt1(c)} L ÷ 100 × ${fmt2(p)} €/L</p>
        </div>`;

    } else {
      const l  = parseFloat(document.getElementById('litres').value);
      const km = parseFloat(document.getElementById('km').value);

      if (isNaN(l) || isNaN(km) || l <= 0 || km <= 0) {
        reset(); return;
      }

      const aux100 = l / km * 100;

      area.className = 'result-area has-result';
      area.innerHTML = `
        <div class="res-content">
          <span class="res-main">${fmt1(aux100)} <span style="font-size:16px;color:#bbb;font-weight:300;">L/100km</span></span>
          <div class="res-sub-row">
            <span class="res-pill">${fmt1(l)} L sur ${fmt1(km)} km</span>
          </div>
          <p class="res-formula">${fmt1(l)} L ÷ ${fmt1(km)} km × 100</p>
        </div>`;
    }
  }

  btn.addEventListener('click', calc);
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });
  });
</script>

</body>
</html>
