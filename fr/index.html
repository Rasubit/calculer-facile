<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Taux d'évolution — Calculer-Facile</title>
  <meta name="description" content="Calculez instantanément le taux d'évolution entre deux valeurs.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray:  #8a8a8a;
      --light: #f2f2f2;
      --up:    #1a7a4a;
      --dn:    #b02020;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* NAV */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      color: var(--black);
    }

    .logo-dot {
      width: 18px; height: 18px;
      background: var(--black);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-dot svg { width: 11px; height: 11px; }

    .logo-name {
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 0;
    }

    nav a {
      font-size: 13px;
      color: var(--black);
      text-decoration: none;
      padding: 6px 13px;
      border-radius: 7px;
      transition: background 0.12s;
    }

    nav a:hover { background: var(--light); }

    .btn-contact {
      background: var(--black);
      color: var(--white) !important;
      border-radius: 100px !important;
      padding: 8px 18px !important;
      font-weight: 500 !important;
      margin-left: 6px;
    }

    .btn-contact:hover { background: #282828 !important; }

    /* MAIN */
    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 80px;
    }

    .hero-eyebrow {
      font-size: 13px;
      color: var(--gray);
      letter-spacing: 0.01em;
      margin-bottom: 12px;
      text-align: center;
    }

    .hero-title {
      font-size: clamp(54px, 9vw, 104px);
      font-weight: 300;
      letter-spacing: -0.035em;
      line-height: 1.0;
      text-align: center;
      color: var(--black);
      margin-bottom: 52px;
      user-select: none;
    }

    /* FLOATING CARD */
    .float-wrap {
      position: relative;
      width: 400px;
      max-width: calc(100vw - 40px);
    }

    .float-card {
      background: var(--white);
      border-radius: 26px;
      border: 1px solid rgba(0,0,0,0.08);
      overflow: hidden;

      /* multi-layer elevation like an object in 3D space */
      box-shadow:
        0 1px 1px rgba(0,0,0,0.03),
        0 4px 8px rgba(0,0,0,0.05),
        0 12px 24px rgba(0,0,0,0.07),
        0 32px 56px rgba(0,0,0,0.09),
        0 64px 96px rgba(0,0,0,0.07);

      animation: levitate 7s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @keyframes levitate {
      0%   { transform: translateY(0px) rotateX(0deg); }
      50%  { transform: translateY(-12px) rotateX(1deg); }
      100% { transform: translateY(0px) rotateX(0deg); }
    }

    /* macOS-like chrome */
    .card-chrome {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 14px 18px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .chrome-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .d-red    { background: #ff5f57; }
    .d-amber  { background: #ffbd2e; }
    .d-green  { background: #28c840; }

    .chrome-label {
      font-size: 11px;
      color: #ccc;
      margin-left: auto;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-body { padding: 20px 20px 20px; }

    /* Input row */
    .inputs-row {
      display: grid;
      grid-template-columns: 1fr 28px 1fr;
      align-items: end;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; align-items: center; }

    .field-lbl {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c0c0c0;
      text-align: center;
    }

    .field input {
      width: 100%;
      background: #f7f7f7;
      border: 1.5px solid #ececec;
      border-radius: 13px;
      padding: 13px 14px;
      font-size: 24px;
      font-weight: 300;
      font-family: 'Inter', sans-serif;
      color: var(--black);
      outline: none;
      text-align: center;
      transition: border-color 0.14s, background 0.14s;
      -moz-appearance: textfield;
    }

    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field input::placeholder { color: #d0d0d0; }
    .field input:focus { border-color: var(--black); background: #fff; }

    .arrow-mid {
      display: flex; align-items: center; justify-content: center;
      padding-bottom: 13px; color: #d0d0d0;
    }

    .arrow-mid svg {
      width: 14px; height: 14px;
      stroke: #d0d0d0; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* Result */
    .result-area {
      background: #f7f7f7;
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 14px;
      min-height: 70px;
      display: flex;
      align-items: center;
      transition: background 0.25s;
    }

    .result-area.is-up   { background: #ebf5f0; }
    .result-area.is-down { background: #fdf0f0; }

    .res-idle {
      font-size: 12px;
      color: #ccc;
      line-height: 1.6;
    }

    .res-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    .res-pct {
      font-size: 42px;
      font-weight: 300;
      letter-spacing: -0.04em;
      color: var(--black);
      line-height: 1;
    }

    .res-pct.up   { color: var(--up); }
    .res-pct.down { color: var(--dn); }

    .res-meta {
      display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 8px;
    }

    .res-pill {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 100px;
      background: rgba(0,0,0,0.06); color: var(--gray);
    }

    .res-pill.up   { background: rgba(26,122,74,0.12); color: var(--up); }
    .res-pill.down { background: rgba(176,32,32,0.12); color: var(--dn); }

    .res-diff {
      font-size: 11px; color: #bbb;
    }

    .res-formula {
      font-size: 11px;
      font-style: italic;
      color: #c8c8c8;
      text-align: center;
      margin-top: 2px;
      line-height: 1.5;
    }

    /* CTA */
    .calc-btn {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 13px;
      padding: 15px;
      font-size: 13.5px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      letter-spacing: 0.005em;
    }

    .calc-btn:hover  { background: #1e1e1e; }
    .calc-btn:active { transform: scale(0.99); }

    /* Ground shadow */
    .ground-shadow {
      width: 60%;
      height: 20px;
      margin: 0 auto;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, transparent 70%);
      border-radius: 50%;
      animation: gshadow 7s ease-in-out infinite;
    }

    @keyframes gshadow {
      0%   { transform: scaleX(1);    opacity: 0.7; }
      50%  { transform: scaleX(0.82); opacity: 0.4; }
      100% { transform: scaleX(1);    opacity: 0.7; }
    }

    /* FOOTER */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 16px;
      pointer-events: none;
    }

    footer span, footer a {
      font-size: 11.5px;
      color: #d0d0d0;
      text-decoration: none;
      pointer-events: all;
      transition: color 0.12s;
    }

    footer a:hover { color: var(--black); }

    @media (max-width: 600px) {
      nav { display: none; }
      .hero-title { font-size: 46px; margin-bottom: 36px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-dot">
      <!-- calculator icon -->
      <svg viewBox="0 0 11 11" fill="none">
        <rect x="1" y="1"   width="3.5" height="2.2" rx="0.6" fill="white"/>
        <rect x="6.5" y="1" width="3.5" height="2.2" rx="0.6" fill="white"/>
        <rect x="1" y="4.4"   width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="6.5" y="4.4" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="1" y="7.2"   width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="6.5" y="7.2" width="3.5" height="1.6" rx="0.6" fill="white"/>
      </svg>
    </div>
    <span class="logo-name">Calculer-Facile</span>
  </a>

  <nav>
    <a href="/fr/">Évolution</a>
    <a href="/fr/tva/">TVA</a>
    <a href="/fr/remise/">Remise</a>
    <a href="/fr/imc/">IMC</a>
    <a href="/fr/credit/">Crédit</a>
    <a href="/fr/carburant/" class="btn-contact">Carburant</a>
  </nav>
</header>

<main>
  <p class="hero-eyebrow">Outil gratuit &mdash; résultat immédiat</p>
  <h1 class="hero-title">Taux d'évolution</h1>

  <div class="float-wrap">
    <div class="float-card">

      <div class="card-chrome">
        <div class="chrome-dot d-red"></div>
        <div class="chrome-dot d-amber"></div>
        <div class="chrome-dot d-green"></div>
        <span class="chrome-label">calculer-facile.fr</span>
      </div>

      <div class="card-body">
        <div class="inputs-row">
          <div class="field">
            <span class="field-lbl">Valeur initiale</span>
            <input id="v1" type="number" placeholder="100" inputmode="decimal" autofocus />
          </div>
          <div class="arrow-mid">
            <svg viewBox="0 0 14 14"><path d="M2 7h10M8 3l4 4-4 4"/></svg>
          </div>
          <div class="field">
            <span class="field-lbl">Valeur finale</span>
            <input id="v2" type="number" placeholder="125" inputmode="decimal" />
          </div>
        </div>

        <div class="result-area" id="res-area">
          <p class="res-idle">Entrez deux valeurs et appuyez sur Calculer.</p>
        </div>

        <button class="calc-btn" id="calc-btn">Calculer l'évolution</button>
      </div>

    </div>

    <div class="ground-shadow"></div>
  </div>
</main>

<footer>
  <span>© 2025 calculer-facile.fr</span>
</footer>

<script>
  const v1 = document.getElementById('v1');
  const v2 = document.getElementById('v2');
  const btn = document.getElementById('calc-btn');
  const area = document.getElementById('res-area');

  function fmt(n) { return n.toLocaleString('fr-FR', { maximumFractionDigits: 2 }); }

  function calc() {
    const a = parseFloat(v1.value), b = parseFloat(v2.value);

    if (isNaN(a) || isNaN(b)) {
      area.className = 'result-area';
      area.innerHTML = '<p class="res-idle">Entrez deux valeurs pour lancer le calcul.</p>';
      return;
    }
    if (a === 0) {
      area.className = 'result-area';
      area.innerHTML = '<p class="res-idle">Impossible\u00a0: la valeur initiale ne peut pas \u00eatre\u00a00.</p>';
      return;
    }

    const diff = b - a;
    const p = (diff / a) * 100;
    const pStr = (p > 0 ? '+' : '') + p.toLocaleString('fr-FR', { maximumFractionDigits: 2 }) + '\u00a0%';
    const dStr = (diff > 0 ? '+' : '') + fmt(diff);

    let cls, pCls, pillCls, label;
    if (diff > 0)      { cls = 'is-up';   pCls = 'up';   pillCls = 'up';   label = 'Hausse'; }
    else if (diff < 0) { cls = 'is-down'; pCls = 'down'; pillCls = 'down'; label = 'Baisse'; }
    else               { cls = '';        pCls = '';      pillCls = '';     label = 'Stable'; }

    area.className = 'result-area ' + cls;
    area.innerHTML = `
      <div class="res-content">
        <span class="res-pct ${pCls}">${pStr}</span>
        <div class="res-meta">
          <span class="res-pill ${pillCls}">${label}</span>
          <span class="res-diff">${dStr}</span>
        </div>
        <p class="res-formula">(${fmt(b)} − ${fmt(a)}) ÷ ${fmt(a)} × 100</p>
      </div>`;
  }

  btn.addEventListener('click', calc);
  [v1, v2].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); }));
</script>

</body>
</html>
