<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Calculateur Mensualité Crédit — Calculer-Facile</title>
  <meta name="description" content="Calculez instantanément votre mensualité de crédit selon le capital, le taux et la durée.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray:  #8a8a8a;
      --light: #f2f2f2;
      --acc:   #2a3a6a;
      --acc-bg:#eaecf7;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .logo {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none; color: var(--black);
    }

    .logo-dot {
      width: 18px; height: 18px; background: var(--black);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }

    .logo-dot svg { width: 11px; height: 11px; }

    .logo-name { font-size: 13.5px; font-weight: 500; letter-spacing: -0.01em; }

    nav { display: flex; align-items: center; gap: 0; }

    nav a {
      font-size: 13px; color: var(--black); text-decoration: none;
      padding: 6px 13px; border-radius: 7px; transition: background 0.12s;
    }

    nav a:hover { background: var(--light); }
    nav a.nav-active { font-weight: 500; }

    .btn-pill {
      background: var(--black); color: var(--white) !important;
      border-radius: 100px !important; padding: 8px 18px !important;
      font-weight: 500 !important; margin-left: 6px;
    }

    .btn-pill:hover { background: #282828 !important; }

    main {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 100px 20px 80px;
    }

    .hero-eyebrow {
      font-size: 13px; color: var(--gray); letter-spacing: 0.01em;
      margin-bottom: 12px; text-align: center;
    }

    .hero-title {
      font-size: clamp(44px, 7.5vw, 96px);
      font-weight: 300; letter-spacing: -0.035em; line-height: 1.0;
      text-align: center; color: var(--black); margin-bottom: 52px;
      user-select: none;
    }

    .float-wrap {
      position: relative; width: 420px;
      max-width: calc(100vw - 40px);
    }

    .float-card {
      background: var(--white); border-radius: 26px;
      border: 1px solid rgba(0,0,0,0.08); overflow: hidden;
      box-shadow:
        0 1px 1px rgba(0,0,0,0.03), 0 4px 8px rgba(0,0,0,0.05),
        0 12px 24px rgba(0,0,0,0.07), 0 32px 56px rgba(0,0,0,0.09),
        0 64px 96px rgba(0,0,0,0.07);
      animation: levitate 7s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @keyframes levitate {
      0%   { transform: translateY(0px) rotateX(0deg); }
      50%  { transform: translateY(-12px) rotateX(1deg); }
      100% { transform: translateY(0px) rotateX(0deg); }
    }

    .card-chrome {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 18px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .chrome-dot { width: 10px; height: 10px; border-radius: 50%; }
    .d-red   { background: #ff5f57; }
    .d-amber { background: #ffbd2e; }
    .d-green { background: #28c840; }

    .chrome-label {
      font-size: 11px; color: #ccc; margin-left: auto;
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .card-body { padding: 20px; }

    /* Durée preset */
    .preset-label {
      font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: #c0c0c0;
      text-align: center; display: block; margin-bottom: 8px;
    }

    .preset-row {
      display: flex; gap: 6px; margin-bottom: 16px;
    }

    .preset-btn {
      flex: 1; background: #f7f7f7; border: 1.5px solid #ececec;
      border-radius: 9px; padding: 8px 4px; font-size: 11.5px;
      font-weight: 500; font-family: 'Inter', sans-serif;
      color: var(--gray); cursor: pointer; transition: all 0.14s;
      text-align: center;
    }

    .preset-btn:hover { background: #f0f0f0; color: var(--black); }
    .preset-btn.active {
      background: var(--black); border-color: var(--black); color: var(--white);
    }

    /* Fields */
    .fields-stack { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; align-items: center; }

    .field-lbl {
      font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: #c0c0c0; text-align: center;
    }

    .input-wrap { position: relative; width: 100%; }

    .field input {
      width: 100%; background: #f7f7f7; border: 1.5px solid #ececec;
      border-radius: 13px; padding: 12px 40px 12px 14px;
      font-size: 22px; font-weight: 300; font-family: 'Inter', sans-serif;
      color: var(--black); outline: none; text-align: center;
      transition: border-color 0.14s, background 0.14s;
      -moz-appearance: textfield;
    }

    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field input::placeholder { color: #d0d0d0; }
    .field input:focus { border-color: var(--black); background: #fff; }

    .unit-mark {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); font-size: 13px;
      font-weight: 500; color: #bbb; pointer-events: none;
    }

    /* Result */
    .result-area {
      background: #f7f7f7; border-radius: 16px; padding: 16px 18px;
      margin-bottom: 14px; min-height: 70px; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.25s; text-align: center;
    }

    .result-area.has-result { background: var(--acc-bg); }

    .res-idle { font-size: 12px; color: #ccc; line-height: 1.6; text-align: center; }

    .res-content {
      width: 100%; display: flex; flex-direction: column;
      align-items: center; gap: 6px;
    }

    .res-main {
      font-size: 46px; font-weight: 300; letter-spacing: -0.04em;
      color: var(--acc); line-height: 1;
    }

    .res-sub-row {
      display: flex; gap: 10px; align-items: center; justify-content: center;
      flex-wrap: wrap;
    }

    .res-pill {
      font-size: 10px; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 3px 10px; border-radius: 100px;
      background: rgba(42,58,106,0.12); color: var(--acc);
    }

    .res-secondary { font-size: 11px; color: #bbb; }

    .res-formula {
      font-size: 11px; font-style: italic; color: #c8c8c8;
      text-align: center; margin-top: 2px;
    }

    .calc-btn {
      width: 100%; background: var(--black); color: var(--white);
      border: none; border-radius: 13px; padding: 15px;
      font-size: 13.5px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.12s, transform 0.1s;
    }

    .calc-btn:hover  { background: #1e1e1e; }
    .calc-btn:active { transform: scale(0.99); }

    .ground-shadow {
      width: 60%; height: 20px; margin: 0 auto;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, transparent 70%);
      border-radius: 50%; animation: gshadow 7s ease-in-out infinite;
    }

    @keyframes gshadow {
      0%   { transform: scaleX(1);    opacity: 0.7; }
      50%  { transform: scaleX(0.82); opacity: 0.4; }
      100% { transform: scaleX(1);    opacity: 0.7; }
    }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; pointer-events: none;
    }

    footer span { font-size: 11.5px; color: #d0d0d0; }

    @media (max-width: 600px) {
      nav { display: none; }
      .hero-title { font-size: 40px; margin-bottom: 36px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-dot">
      <svg viewBox="0 0 11 11" fill="none">
        <rect x="1"   y="1"   width="3.5" height="2.2" rx="0.6" fill="white"/>
        <rect x="6.5" y="1"   width="3.5" height="2.2" rx="0.6" fill="white"/>
        <rect x="1"   y="4.4" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="6.5" y="4.4" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="1"   y="7.2" width="3.5" height="1.6" rx="0.6" fill="white"/>
        <rect x="6.5" y="7.2" width="3.5" height="1.6" rx="0.6" fill="white"/>
      </svg>
    </div>
    <span class="logo-name">Calculer-Facile</span>
  </a>

  <nav>
    <a href="/fr/">Évolution</a>
    <a href="/fr/tva/">TVA</a>
    <a href="/fr/remise/">Remise</a>
    <a href="/fr/imc/">IMC</a>
    <a href="/fr/credit/" class="nav-active">Crédit</a>
    <a href="/fr/carburant/" class="btn-pill">Carburant</a>
  </nav>
</header>

<main>
  <p class="hero-eyebrow">Outil gratuit &mdash; résultat immédiat</p>
  <h1 class="hero-title">Mensualité crédit</h1>

  <div class="float-wrap">
    <div class="float-card">

      <div class="card-chrome">
        <div class="chrome-dot d-red"></div>
        <div class="chrome-dot d-amber"></div>
        <div class="chrome-dot d-green"></div>
        <span class="chrome-label">calculer-facile.fr</span>
      </div>

      <div class="card-body">

        <span class="preset-label">Durée du crédit</span>
        <div class="preset-row">
          <button class="preset-btn" data-mois="12">1 an</button>
          <button class="preset-btn" data-mois="24">2 ans</button>
          <button class="preset-btn active" data-mois="60">5 ans</button>
          <button class="preset-btn" data-mois="120">10 ans</button>
          <button class="preset-btn" data-mois="240">20 ans</button>
          <button class="preset-btn" data-mois="300">25 ans</button>
        </div>

        <!-- Durée en mois — option secondaire -->
        <div style="display:flex;align-items:center;gap:10px;margin:4px 0 10px;">
          <div style="flex:1;height:1px;background:#ececec;"></div>
          <span style="font-size:10px;color:#ccc;font-weight:500;letter-spacing:0.05em;">ou saisir en mois</span>
          <div style="flex:1;height:1px;background:#ececec;"></div>
        </div>
        <div class="field" style="margin-bottom:14px;">
          <div class="input-wrap">
            <input id="duree" type="number" placeholder="ex : 18" inputmode="numeric"
              style="font-size:16px;padding:9px 50px 9px 14px;color:#aaa;" />
            <span class="unit-mark">mois</span>
          </div>
        </div>

        <div class="fields-stack">
          <div class="field">
            <span class="field-lbl">Capital emprunté</span>
            <div class="input-wrap">
              <input id="capital" type="number" placeholder="10 000" inputmode="decimal" autofocus />
              <span class="unit-mark">€</span>
            </div>
          </div>
          <div class="field">
            <span class="field-lbl">Taux annuel</span>
            <div class="input-wrap">
              <input id="taux" type="number" placeholder="3.5" inputmode="decimal" step="0.1" />
              <span class="unit-mark">%</span>
            </div>
          </div>
        </div>

        <div class="result-area" id="res-area">
          <p class="res-idle">Renseignez les 3 champs pour calculer.</p>
        </div>

        <button class="calc-btn" id="calc-btn">Calculer la mensualité</button>

      </div>
    </div>
    <div class="ground-shadow"></div>
  </div>
</main>

<footer>
  <span>© 2025 calculer-facile.fr</span>
</footer>

<script>
  const capitalEl = document.getElementById('capital');
  const tauxEl    = document.getElementById('taux');
  const dureeEl   = document.getElementById('duree');
  const btn       = document.getElementById('calc-btn');
  const area      = document.getElementById('res-area');

  // Presets durée
  document.querySelectorAll('.preset-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      dureeEl.value = b.dataset.mois;
      if (capitalEl.value && tauxEl.value) calc();
    });
  });

  // Sync preset highlight when user types in duree
  dureeEl.addEventListener('input', () => {
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mois === dureeEl.value);
    });
  });

  function fmt(n) {
    return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calc() {
    const C = parseFloat(capitalEl.value);
    const r = parseFloat(tauxEl.value) / 100 / 12;
    const n = parseInt(dureeEl.value);

    if (isNaN(C) || isNaN(r) || isNaN(n) || C <= 0 || n <= 0) {
      area.className = 'result-area';
      area.innerHTML = '<p class="res-idle">Renseignez les 3 champs pour calculer.</p>';
      return;
    }

    let mensualite, coutTotal, interets;

    if (r === 0) {
      mensualite = C / n;
    } else {
      mensualite = C * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
    }

    coutTotal = mensualite * n;
    interets  = coutTotal - C;

    area.className = 'result-area has-result';
    area.innerHTML = `
      <div class="res-content">
        <span class="res-main">${fmt(mensualite)} €<span style="font-size:16px;color:#bbb;font-weight:300;">/mois</span></span>
        <div class="res-sub-row">
          <span class="res-pill">${n} mois · ${parseFloat(tauxEl.value)}% /an</span>
        </div>
        <div class="res-sub-row" style="margin-top:2px;">
          <span class="res-secondary">Coût total : ${fmt(coutTotal)} €</span>
          <span class="res-secondary">·</span>
          <span class="res-secondary">Intérêts : ${fmt(interets)} €</span>
        </div>
        <p class="res-formula">C × r(1+r)ⁿ ÷ ((1+r)ⁿ − 1)</p>
      </div>`;
  }

  btn.addEventListener('click', calc);
  [capitalEl, tauxEl, dureeEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });
  });
</script>

</body>
</html>
